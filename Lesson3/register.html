<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Coffee Management System</title>
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <a href="index.html" class="back-btn"
        ><i class="fas fa-arrow-left"></i> Trang chủ</a
      >
      <div class="auth-header">
        <h1>Coffee Management System</h1>
        <h2>Đăng ký</h2>
      </div>

      <!-- Thông báo (mặc định ẩn) -->
      <div
        id="error-message"
        style="
          display: none;
          color: #e74c3c;
          background: #fdecea;
          padding: 10px;
          border-radius: 8px;
          margin-bottom: 15px;
          font-size: 14px;
          text-align: center;
        "
      ></div>
      <div
        id="success-message"
        style="
          display: none;
          color: #27ae60;
          background: #eafaf1;
          padding: 10px;
          border-radius: 8px;
          margin-bottom: 15px;
          font-size: 14px;
          text-align: center;
        "
      ></div>

      <form id="register-form">
        <div class="input-group">
          <i class="far fa-user"></i>
          <input type="text" class="form-control" placeholder="Name" required />
        </div>

        <div class="input-group">
          <i class="far fa-envelope"></i>
          <input
            type="email"
            class="form-control"
            placeholder="Email"
            required
          />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input
            type="password"
            class="form-control"
            placeholder="Confirm password"
            required
          />
        </div>
        
        <button type="submit" class="btn-submit">Đăng ký</button>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </div>

    <!-- Firebase SDK (Version 10.13.1 Compat for vanilla JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.13.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-storage-compat.min.js"></script>
    <!-- Firebase Auth  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.13.1/firebase-auth-compat.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
