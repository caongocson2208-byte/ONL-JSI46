<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="admin-page">

    <div class="page-wrapper">
        <div class="sidebar">
            <div class="logo">
                <a href="/">
                    <img src="./src/img/logo.png" alt="Logo">
                    <span class="logo-text">MindX Coffee</span>
                </a>
            </div>
            <ul class="menu">
                <li><a href="admin.html">Sản phẩm</a></li>
                <li><a href="admin_order.html" class="active">Đơn hàng</a></li>
                <li><a href="/">Danh mục</a></li>
                <li><a href="/">Quyền</a></li>
                <li><a href="/">Cài đặt</a></li>
            </ul>
        </div>

        <div class="content">
            <div class="product-table">
                <h5>Quản lý đơn hàng</h5>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Sản phẩm</th>
                                <th>Khách hàng</th>
                                <th>Giá</th>
                                <th>Ngày đặt</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="order-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="./js/firebase-config.js"></script>
    <script src="./js/check_session.js"></script>
    <script>
        checkSession();
        const userSession = JSON.parse(localStorage.getItem('user_session'));
        if (!userSession || userSession.role_id != 1) {
            window.location.href = "./index.html";
        }
    </script>
    <script src="./js/admin_order.js"></script>
</body>
</html>
