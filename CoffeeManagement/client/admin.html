<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Coffee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="admin-page">

    <div class="page-wrapper">
        <div class="sidebar">
            <div class="logo">
                <a href="/">
                    <span class="logo-text text-primary">MindX Coffee</span>
                </a>
            </div>
            <ul class="menu">
                <li><a href="/" class="active">Sản phẩm</a></li>
                <li><a href="./admin_order.html">Đơn hàng</a></li>
                <li><a href="/">Danh mục</a></li>
                <li><a href="/">Quyền</a></li>
                <li><a href="/">Cài đặt</a></li>
            </ul>
        </div>

        <div class="content">
            <div class="row g-4">
                <div class="col-12 col-md-4">
                    <div class="admin-form-card">
                        <h5>Thêm sản phẩm</h5>
                        <form id="product-form">
                            <div class="mb-3">
                                <label class="form-label">Tên sản phẩm</label>
                                <input type="text" class="form-control" id="product_name" name="product_name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Giá bán</label>
                                <input type="number" class="form-control" id="product_price" name="product_price">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ảnh</label>
                                <input type="file" class="form-control" id="product_image" name="product_image">
                            </div>
                            <div class="d-flex gap-2 mt-3">
                                <button type="submit" class="btn-save">Lưu</button>
                                <button type="reset" class="btn-reset">Đặt lại</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-12 col-md-8">
                    <div class="product-table">
                        <h5>Danh sách sản phẩm</h5>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Ảnh sản phẩm</th>
                                        <th>Tên sản phẩm</th>
                                        <th>Giá</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="product-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="./js/firebase-config.js"></script>
    <script src="./js/check_session.js"></script>
    <script>
        checkSession();
        const userSession = JSON.parse(localStorage.getItem('user_session'));
        if (!userSession || userSession.role_id != 1) {
            window.location.href = "./index.html";
        }
    </script>
    <script src="./js/admin.js"></script>
</body>
</html>
