<!DOCTYPE html>
<html lang="vi">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home - Coffee Management</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>
        <header class="navbar">
            <div class="logo"><i class="fas fa-bolt"></i> Cafe</div>
            <nav class="nav-links">
                <a href="index.html" class="active">Trang chủ</a>
                <a href="order.html" class="active">Đơn hàng</a>
                <div class="dropdown" id="user-dropdown">
                    <a href="#"><i class="far fa-user"></i> <span id="nav-username"></span> <i class="fas fa-caret-down"></i></a>
                    <div class="dropdown-content" id="guest-menu">
                        <a href="login.html">Đăng nhập</a>
                        <a href="register.html">Đăng ký</a>
                    </div>
                    <div class="dropdown-content" id="user-menu" style="display:none">
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                    </div>
                </div>
            </nav>
        </header>

        <section class="hero-section">
            <div class="hero-content">
                <div class="hero-text">
                    <h1>Bắt đầu ngày với một tách<br>đen đá không đường...</h1>
                    <button class="btn-primary">Mua ngay</button>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1551030173-122aabc4489c?q=80&w=600&auto=format&fit=crop" style="border-radius:50%; border:5px solid white" alt="Coffee cup">
                </div>
            </div>
            <div class="wave">
                <svg viewBox="0 0 1440 120" preserveAspectRatio="none" style="display:block; width:100%; height:120px">
                    <path d="M0,60 C320,120 420,-40 720,60 C1020,160 1120,-20 1440,60 L1440,150 L0,150 Z" style="fill:white"></path>
                </svg>
            </div>
        </section>

        <main class="main-content">
            <div class="info-section">
                <div class="video-container">
                    <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=1000&auto=format&fit=crop" alt="Latte Art">
                    <div class="play-btn"><i class="fab fa-youtube"></i></div>
                </div>
                <div class="quote-container">
                    <h2>Have a sip - Uống gì không?</h2>
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                </div>
            </div>

            <div class="menu-section">
                <h2>Hôm nay có gì?</h2>
                <div class="menu-grid" id="menu-grid">
                    <p style="color:#999">Đang tải sản phẩm...</p>
                </div>
            </div>
        </main>

        <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
        <script src="js/firebase-config.js"></script>
        <script src="js/main.js"></script>
        <script src="js/home.js"></script>
    </body>

</html>
