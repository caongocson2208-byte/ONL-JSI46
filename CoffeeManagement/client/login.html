<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Coffee Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Trang chủ</a>
        <div class="auth-header">
            <h1>Coffee Management System</h1>
            <h2>Đăng nhập</h2>
        </div>

        <div id="error-message" style="display:none; color:#e74c3c; background:#fdecea; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px; text-align:center;"></div>

        <form id="login-form">
            <div class="input-group">
                <i class="far fa-envelope"></i>
                <input type="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-submit">Đăng nhập</button>
        </form>

        <div class="auth-footer">
            Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
